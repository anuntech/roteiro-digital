services:
  roteiro-digital-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - API_BASE_URL=${API_BASE_URL}
    container_name: roteiro-digital-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /app/roteiro-digital-frontend-dist:/app/dist
    environment:
      - NODE_ENV=production
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - caddy-network

networks:
  caddy-network:
    name: caddy-network
    external: true
